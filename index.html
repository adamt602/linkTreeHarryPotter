<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Adam's Media Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #080a0f;
    --surface: #0e1118;
    --surface2: #141820;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.14);
    --text: #e8e6f0;
    --muted: #5a5870;
    --accent-gold: #c9a96e;
    --accent-blue: #5c9ee0;
    --glow-gold: rgba(201,169,110,0.15);
    --glow-blue: rgba(92,158,224,0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .bg-glow {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(201,169,110,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 580px;
    margin: 0 auto;
    padding: 5rem 1.5rem 6rem;
  }

  header {
    text-align: center;
    margin-bottom: 4rem;
    animation: fadeDown 0.8s ease both;
  }

  .avatar {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-gold), #7c5c2a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    margin: 0 auto 1.4rem;
    box-shadow: 0 0 48px rgba(201,169,110,0.3);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 2.8rem);
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 30%, var(--accent-gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* Featured card */
  .card {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    padding: 1.3rem 1.4rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    text-decoration: none;
    color: var(--text);
    margin-bottom: 1rem;
    transition: all 0.22s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.22s ease;
    border-radius: inherit;
  }

  .card:hover { transform: translateY(-3px); }
  .card:hover::before { opacity: 1; }

  .card.gold {
    background: linear-gradient(135deg, rgba(201,169,110,0.09), rgba(201,169,110,0.03));
    border-color: rgba(201,169,110,0.22);
  }
  .card.gold::before { background: var(--glow-gold); }
  .card.gold:hover {
    border-color: rgba(201,169,110,0.42);
    box-shadow: 0 12px 48px rgba(201,169,110,0.14);
  }

  .card.blue {
    background: linear-gradient(135deg, rgba(92,158,224,0.08), rgba(92,158,224,0.02));
    border-color: rgba(92,158,224,0.18);
  }
  .card.blue::before { background: var(--glow-blue); }
  .card.blue:hover {
    border-color: rgba(92,158,224,0.38);
    box-shadow: 0 12px 48px rgba(92,158,224,0.12);
  }

  .card-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }

  .card.gold .card-icon {
    background: linear-gradient(135deg, rgba(201,169,110,0.2), rgba(201,169,110,0.05));
    border: 1px solid rgba(201,169,110,0.2);
  }

  .card.blue .card-icon {
    background: linear-gradient(135deg, rgba(92,158,224,0.18), rgba(92,158,224,0.04));
    border: 1px solid rgba(92,158,224,0.18);
  }

  .card:hover .card-icon { transform: scale(1.08); }

  .card-body { flex: 1; min-width: 0; }

  .card-title {
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.01em;
  }

  .card.gold .card-title { color: var(--accent-gold); }
  .card.blue .card-title { color: var(--accent-blue); }

  .card-desc {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    margin-top: 0.2rem;
  }

  .card.gold .card-desc { color: rgba(201,169,110,0.55); }
  .card.blue .card-desc { color: rgba(92,158,224,0.55); }

  .card-arrow {
    font-size: 1.1rem;
    flex-shrink: 0;
    transition: transform 0.2s ease, opacity 0.2s ease;
    opacity: 0.4;
  }

  .card.gold .card-arrow { color: var(--accent-gold); }
  .card.blue .card-arrow { color: var(--accent-blue); }

  .card:hover .card-arrow {
    transform: translateX(4px);
    opacity: 1;
  }

  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }

  footer {
    text-align: center;
    margin-top: 4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    animation: fadeUp 0.8s 0.4s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="container">

  <header>
    <div class="avatar">🎬</div>
    <h1>PotterFlix</h1>
    <p class="tagline">Your personal media universe</p>
  </header>

  <a href="https://potterflix.org" class="card gold" target="_blank" rel="noopener">
    <div class="card-icon">🎬</div>
    <div class="card-body">
      <div class="card-title">Request Movies & TV</div>
      <div class="card-desc">Browse and request anything — movies, shows, anime</div>
    </div>
    <span class="card-arrow">→</span>
  </a>

  <a href="https://books.potterflix.org" class="card blue" target="_blank" rel="noopener">
    <div class="card-icon">📚</div>
    <div class="card-body">
      <div class="card-title">Book Library</div>
      <div class="card-desc">Browse and download ebooks from the collection</div>
    </div>
    <span class="card-arrow">→</span>
  </a>

  <footer>
    potterflix.org · self-hosted with ❤️
  </footer>

</div>
</body>
</html>
